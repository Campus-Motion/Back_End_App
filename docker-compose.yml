services:
  # 1. PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: campus_motion_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: campus_motion
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./schema_v4.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - epfl_private_network # ← was missing before!
    # ports exposed only for local dev debugging, remove in production
    ports:
      - "5432:5432"

  # 2. NestJS API
  api-server:
    build:
      context: ./api_v1 # ← build from local folder, not a remote image
      dockerfile: Dockerfile
    container_name: campus_motion_api
    restart: unless-stopped
    environment:
      # Two separate role connections (matches your database.module.ts)
      API_DB_URL: postgres://api_role:secure_api_password@postgres:5432/campus_motion
      AUTH_DB_URL: postgres://auth_role:secure_auth_password@postgres:5432/campus_motion
      JWT_SECRET: change_this_to_a_long_random_secret
    networks:
      - epfl_private_network
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - postgres

networks:
  epfl_private_network:
    driver: bridge

volumes:
  pgdata:
